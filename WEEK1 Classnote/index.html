<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon card</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js"></script>
</head>
<body>
    <h1>Pokemon Card</h1>
    <div class="container">
        <div class="card">
            Enter the card number<br>
            <input type="text" id="cardnumber" placeholder="Card Number">
            <button id="search" onclick="searchCard()">Search</button>
        </div>
        <div class="card-category">
            Select the card category<br>
            <input type="text" id="category" placeholder="Card Category">
            <button id="search" onclick="searchCategory()">Search</button>
            <nav></nav>
        </div>
    </div>
</body>
</html>
