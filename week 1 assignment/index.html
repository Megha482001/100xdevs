<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevenlabs | Signup</title>
    <link href="./style.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        11Elevenlabs
        <div class="Signup">
            <h1>Create an Account</h1>
            <form action="/signup" method="post">
                <div class="Google">
                    <img src="https://developers.google.com/identity/images/g-logo.png" width="18"
                        style="vertical-align: middle; margin-right: 8px;">
                    Sign up with Google
                </div>
                <hr class="line">
                <div class="email-signup">
                    <label for="email">Email</label><br>
                    <input type="email" id="email" class="email" placeholder="">
                </div>
                <div class="password-signup">
                    <label for="password">Password</label><br>
                    <input type="password" id="password" class="email" placeholder="">
                </div>
                <div class="Signup-button" width="18" style="vertical-align: middle; margin-right: 8px;">
                    Sign-up
                </div>
                <div class="signin-text">
                    Already registered? <a href="/signin">Sign in</a>
                </div>
                <footer class="foot">
                    By continuing, you agree to our <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>.
                </footer>
        </div>
    </div>
</body>

</html>
